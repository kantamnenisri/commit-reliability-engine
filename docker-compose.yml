version: '3.8'

services:
  webhook-gateway:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./src/webhook-gateway:/app
    command: >
      bash -c "pip install -r requirements.txt && python main.py"
    ports:
      - "8000:8000"

  ml-predictor:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./src/ml-predictor:/app
    command: >
      bash -c "pip install -r requirements.txt && python model_server.py"
    ports:
      - "8001:8001"

  policy-enforcer:
    image: golang:1.20
    working_dir: /app
    volumes:
      - ./src/policy-enforcer:/app
    command: go run enforcer.go
    ports:
      - "8080:8080"